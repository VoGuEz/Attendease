<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase | Profile</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div>
            <h2>Profile Settings</h2>
            <div class="user-info">
                <span id="userEmail"></span>
            </div>
        </div>
        <div class="right-section">
            <div class="theme-switcher">
                <button class="theme-btn" data-theme-btn="system" title="System">🖥️</button>
                <button class="theme-btn active" data-theme-btn="dark" title="Dark">🌙</button>
                <button class="theme-btn" data-theme-btn="light" title="Light">☀️</button>
            </div>
            <a id="backLink" href="#" style="color: var(--primary-color);">← Back</a>
            <button id="logoutBtn" class="btn-secondary">Sign Out</button>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="card" style="max-width: 600px;">
                <h3>Edit Profile</h3>
                <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">
                    Update your profile information
                </p>
                
                <form onsubmit="handleUpdateProfile(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profileFullName" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profileEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="profileRole" disabled style="opacity: 0.6;">
                    </div>

                    <div id="profileMessage" class="form-message"></div>

                    <div style="display: flex; gap: 12px; margin-top: 24px;">
                        <button type="submit" class="btn-primary" style="flex: 1;">Save Changes</button>
                        <button type="button" class="btn-secondary" onclick="goBack()" style="flex: 1;">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script>
        initTheme();

        let currentProfile = null;

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            clearAuthToken();
            window.location.href = 'index.html';
        });

        window.addEventListener('load', async () => {
            try {
                const profile = await getProfile();
                currentProfile = profile;
                
                document.getElementById('userEmail').textContent = profile.email;
                document.getElementById('profileFullName').value = profile.fullname || '';
                document.getElementById('profileEmail').value = profile.email || '';
                document.getElementById('profileRole').value = profile.role || '';
                
                // Set back link based on role
                const backLink = document.getElementById('backLink');
                if (profile.role === 'lecturer') {
                    backLink.href = 'lecturer-dashboard.html';
                } else {
                    backLink.href = 'student-dashboard.html';
                }
            } catch (error) {
                console.error('Load error:', error);
                clearAuthToken();
                window.location.href = 'index.html';
            }
        });

        async function handleUpdateProfile(e) {
            e.preventDefault();
            clearMessage('profileMessage');

            const fullname = document.getElementById('profileFullName').value;
            const email = document.getElementById('profileEmail').value;

            try {
                await updateProfile(fullname, email);
                showMessage('profileMessage', 'Profile updated successfully!', 'success');
                setTimeout(() => {
                    if (currentProfile.role === 'lecturer') {
                        window.location.href = 'lecturer-dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                }, 1500);
            } catch (error) {
                showMessage('profileMessage', error.message, 'error');
            }
        }

        function goBack() {
            if (currentProfile.role === 'lecturer') {
                window.location.href = 'lecturer-dashboard.html';
            } else {
                window.location.href = 'student-dashboard.html';
            }
        }
    </script>
</body>
</html>
