server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/attendease_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# LOCAL DEVELOPMENT ONLY — set a real password for production
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT: Replace this secret with a secure random value in production (use env var JWT_SECRET).
# Example: export JWT_SECRET=<your-256-bit-random-key>
# This default value MUST NOT be used in any environment other than local development.
jwt.secret=CHANGE_ME_IN_PRODUCTION_USE_ENV_VAR_JWT_SECRET_256_BIT_RANDOM_KEY_MINIMUM
jwt.expiration=86400000

logging.level.com.attendease=DEBUG
