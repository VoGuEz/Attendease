<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – AttendEase</title>
  <link rel="stylesheet" href="css/styles.css?v=5" />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <style>
    /* Scoped fixes for the signup card layout */
    .auth-card {
      width: 100%;
      max-width: 440px;
    }

    #signup-form .form-group {
      margin-bottom: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    #signup-form .form-group label {
      display: block;
      margin-bottom: 6px;
    }

    #signup-form .form-group input {
      width: 100%;
      box-sizing: border-box;
    }

    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .password-wrapper input {
      width: 100%;
      box-sizing: border-box;
      padding-right: 40px;
    }

    .password-wrapper .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      z-index: 10; /* Ensures button is clickable over input background */
    }

    .role-selector {
      display: flex;
      gap: 10px;
    }

    .role-selector .role-btn {
      flex: 1;
    }

    #signup-form .btn {
      width: 100%;
      margin-top: 8px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="theme-switcher-corner" id="theme-switcher-container"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="images/logo.png" alt="AttendEase Logo" class="auth-logo-img" />
        <h1>AttendEase</h1>
        <p>Create your account</p>
      </div>

      <h2>Get started</h2>

      <div id="auth-msg" class="msg"></div>

      <form id="signup-form">

        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="John Doe"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 6 characters"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              class="toggle-btn"
              data-toggle="password"
              tabindex="-1"
              aria-label="Toggle password visibility"
            >
              <span class="toggle-icon">👁️</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
              autocomplete="new-password"
              required
            />
            <button
              type="button"
              class="toggle-btn"
              data-toggle="confirmPassword"
              tabindex="-1"
              aria-label="Toggle password visibility"
            >
              <span class="toggle-icon">👁️</span>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>I am a</label>
          <div class="role-selector">
            <button type="button" class="role-btn active" data-role="student">🎓 Student</button>
            <button type="button" class="role-btn" data-role="lecturer">👨‍🏫 Lecturer</button>
          </div>
        </div>

        <button type="submit" class="btn">Create Account</button>

      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/themes.js?v=3"></script>
  <script src="js/auth.js?v=2"></script>
  <script>
    renderThemeSwitcher('theme-switcher-container');
    const user = getUser();
    if (user && getToken()) window.location.href = 'dashboard.html';

    // Improved Password Toggle Logic
    document.querySelectorAll('.toggle-btn').forEach(button => {
      button.addEventListener('click', function() {
        const inputId = this.getAttribute('data-toggle');
        const input = document.getElementById(inputId);
        const icon = this.querySelector('.toggle-icon');

        if (input && icon) {
          const isHidden = input.type === 'password';
          input.type = isHidden ? 'text' : 'password';
          icon.textContent = isHidden ? '🙈' : '👁️';
        }
      });
    });
  </script>
</body>
</html>
