<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecturer Dashboard – AttendEase</title>
  <link rel="stylesheet" href="css/styles.css?v=6" />
  <link rel="icon" type="image/png" href="images/logo.png" />
</head>
<body>

  <nav class="navbar">
    <button class="hamburger-menu" id="hamburger-btn">
      <span></span><span></span><span></span>
    </button>
    <a href="lecturer.html" class="logo"><img src="images/logo.png" alt="AttendEase" class="navbar-logo-img" /> AttendEase</a>
    <div class="navbar-right">
      <div class="user-badge">
        <span class="avatar-badge" id="user-avatar">L</span>
        <span class="user-badge-name" id="user-name">Lecturer</span>
      </div>
      <div id="theme-switcher-container"></div>
      <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-layout">
    <div class="mobile-overlay" id="mobile-overlay"></div>
    
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-user-info">
        <span class="sidebar-user-avatar" id="sidebar-avatar">L</span>
        <span class="sidebar-user-name" id="sidebar-user-name">Lecturer</span>
      </div>
      <ul class="sidebar-nav">
        <li class="active"><a href="#" data-section="overview">🏠 Dashboard</a></li>
        <li><a href="#" data-scroll="live-sessions-anchor">📡 Live Sessions</a></li>
        <li><a href="#" data-section="courses">📘 My Courses</a></li>
        <li><a href="#" data-section="students">👥 All Students</a></li>
        <li><a href="#" data-section="settings">⚙️ Settings</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="breadcrumb" id="breadcrumb">Dashboard / Overview</div>

      <div id="section-overview" class="section active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Courses</div>
            <div class="stat-value" id="stat-courses">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Sessions</div>
            <div class="stat-value" id="stat-active-sessions">0</div>
          </div>
        </div>

        <div id="live-sessions-anchor" style="padding-top: 20px;"></div>
        <div class="section-header">
          <h3>Live Sessions</h3>
          <button class="btn btn-sm btn-outline" onclick="loadActiveSessions()">🔄 Refresh</button>
        </div>
        <div class="items-grid" id="active-sessions-list">
          <p class="empty-state">No live sessions currently.</p>
        </div>
      </div>

      <div id="section-courses" class="section">
        <div class="section-header">
          <h2>My Courses</h2>
          <button class="btn" onclick="openModal('modal-create-course')">+ New Course</button>
        </div>
        <div class="items-grid" id="courses-list">
          <div class="loading-overlay"><span class="spinner"></span></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-create-course">
    <div class="modal">
      <div class="modal-header">
        <h3>Create New Course</h3>
        <button class="modal-close" onclick="closeModal('modal-create-course')">✕</button>
      </div>
      <form id="form-create-course">
        <div class="form-group">
          <label>Course Name *</label>
          <input type="text" id="course-name" required />
        </div>
        <div class="form-group">
          <label>Course Code *</label>
          <input type="text" id="course-code" required />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal('modal-create-course')">Cancel</button>
          <button type="submit" class="btn">Create Course</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=4"></script>
  <script src="js/themes.js?v=4"></script>
  <script src="js/lecturer.js?v=6"></script>
  
  <script>
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  </script>
</body>
</html>
