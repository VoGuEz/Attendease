<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – AttendEase</title>
  <link rel="stylesheet" href="css/styles.css?v=5" />
  <link rel="icon" type="image/png" href="images/logo.png" />
</head>
<body>

  <div class="theme-switcher-corner" id="theme-switcher-container"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="images/logo.png" alt="AttendEase Logo" class="auth-logo-img" />
        <h1>AttendEase</h1>
        <p>Create your account</p>
      </div>

      <h2>Get started</h2>

      <div id="auth-msg" class="msg"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="John Doe" autocomplete="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 6 characters" autocomplete="new-password" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required />
        </div>
        <div class="form-group">
          <label>I am a</label>
          <div class="role-selector">
            <button type="button" class="role-btn active" data-role="student">🎓 Student</button>
            <button type="button" class="role-btn" data-role="lecturer">👨‍🏫 Lecturer</button>
          </div>
        </div>
        <button type="submit" class="btn" style="width:100%; margin-top:8px">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="index.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/themes.js?v=3"></script>
  <script src="js/auth.js?v=2"></script>
  <script>
    renderThemeSwitcher('theme-switcher-container');
    const user = getUser();
    if (user && getToken()) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
