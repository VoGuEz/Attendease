<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase | Sign Up</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' dominant-baseline='middle'>📖</text></svg>">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="logo">📖</div>
            <h1>AttendEase</h1>
            
            <p class="subtitle">Create your account</p>
            
            <div class="role-tabs">
                <button class="role-btn active" id="roleStudentBtn">👨‍🎓 Student</button>
                <button class="role-btn" id="roleLecturerBtn">👨‍🏫 Lecturer</button>
            </div>
            
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <input type="text" id="signupName" placeholder="Full name" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="signupEmail" placeholder="Email address" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password" required>
                </div>
                <button type="submit" class="primary-btn">Create Account</button>
            </form>
            
            <div id="signupMessage" class="form-message"></div>
            
            <p class="form-toggle">Already have an account? <a href="login.html">Sign in</a></p>
            
            <div style="text-align: center; margin-top: 20px;">
                <div class="theme-switcher" style="justify-content: center;">
                    <button class="theme-btn" data-theme-btn="system" title="System">🖥️</button>
                    <button class="theme-btn active" data-theme-btn="dark" title="Dark">🌙</button>
                    <button class="theme-btn" data-theme-btn="light" title="Light">☀️</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script>
        initTheme();

        let selectedRole = 'student';

        document.getElementById('roleStudentBtn').addEventListener('click', () => {
            selectedRole = 'student';
            document.getElementById('roleStudentBtn').classList.add('active');
            document.getElementById('roleLecturerBtn').classList.remove('active');
        });

        document.getElementById('roleLecturerBtn').addEventListener('click', () => {
            selectedRole = 'lecturer';
            document.getElementById('roleLecturerBtn').classList.add('active');
            document.getElementById('roleStudentBtn').classList.remove('active');
        });

        async function handleSignup(e) {
            e.preventDefault();
            clearMessage('signupMessage');

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) {
                showMessage('signupMessage', 'All fields are required', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('signupMessage', 'Password must be at least 6 characters', 'error');
                return;
            }

            try {
                console.log('Signing up with:', {name, email, role: selectedRole});
                await signup(name, email, password, selectedRole);
                showMessage('signupMessage', 'Account created! Redirecting to login...', 'success');
                document.getElementById('signupName').value = '';
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Signup error:', error);
                showMessage('signupMessage', error.message || 'Signup failed', 'error');
            }
        }
    </script>
</body>
</html>
