<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – AttendEase</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="theme-switcher-corner" id="theme-switcher-container"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="emoji">📚</span>
        <h1>AttendEase</h1>
        <p>Smart attendance management</p>
      </div>

      <h2>Welcome back</h2>

      <div id="auth-msg" class="msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn" style="width:100%; margin-top:8px">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/auth.js"></script>
  <script>
    renderThemeSwitcher('theme-switcher-container');
    // Redirect if already logged in
    const user = getUser();
    if (user && getToken()) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
