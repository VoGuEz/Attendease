server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/attendease_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=attendease-super-secret-jwt-key-2024-production-ready-long-key-minimum-256-bits
jwt.expiration=86400000

logging.level.com.attendease=DEBUG
