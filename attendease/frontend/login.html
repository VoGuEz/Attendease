<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendEase | Sign In</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50' font-size='50' dominant-baseline='middle'>📖</text></svg>">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box">
            <div class="logo">📖</div>
            <h1>AttendEase</h1>
            
            <p class="subtitle">Sign in to continue</p>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="primary-btn">Sign In</button>
            </form>
            
            <div id="loginMessage" class="form-message"></div>
            
            <p class="form-toggle">Don't have an account? <a href="index.html">Sign up</a></p>
            
            <div style="text-align: center; margin-top: 20px;">
                <div class="theme-switcher" style="justify-content: center;">
                    <button class="theme-btn" data-theme-btn="system" title="System">🖥️</button>
                    <button class="theme-btn active" data-theme-btn="dark" title="Dark">🌙</button>
                    <button class="theme-btn" data-theme-btn="light" title="Light">☀️</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script>
        initTheme();

        async function handleLogin(e) {
            e.preventDefault();
            clearMessage('loginMessage');

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('loginMessage', 'Email and password are required', 'error');
                return;
            }

            try {
                console.log('Logging in with:', {email});
                const response = await login(email, password);
                console.log('Login response received:', response);
                
                if (!response || !response.token) {
                    showMessage('loginMessage', 'Invalid response from server', 'error');
                    return;
                }

                setAuthToken(response.token, response);
                console.log('Token saved:', response.token.substring(0, 20) + '...');
                console.log('User role:', response.role);
                
                setTimeout(() => {
                    const savedToken = localStorage.getItem('token');
                    console.log('Verified token in storage:', savedToken ? 'YES' : 'NO');
                    
                    if (response.role === 'lecturer') {
                        console.log('Redirecting to lecturer dashboard...');
                        window.location.href = 'lecturer-dashboard.html';
                    } else if (response.role === 'student') {
                        console.log('Redirecting to student dashboard...');
                        window.location.href = 'student-dashboard.html';
                    } else {
                        console.error('Unknown role:', response.role);
                        showMessage('loginMessage', 'Unknown user role', 'error');
                    }
                }, 100);
            } catch (error) {
                console.error('Login error:', error);
                showMessage('loginMessage', error.message || 'Login failed', 'error');
            }
        }
    </script>
</body>
</html>
